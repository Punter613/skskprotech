<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b0b0f" />
  <link rel="manifest" href="/manifest.json">
  <title>SKSK ProTech</title>
  <style>
    :root {
      --bg: #07070a;
      --panel: #101015;
      --panel-2: #17171f;
      --accent: #c1121f;
      --accent-2: #ff3b30;
      --text: #f5f5f7;
      --muted: #b7b7c2;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
      --success: #3ddc97;
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(193,18,31,0.22), transparent 35%),
        linear-gradient(180deg, #09090d 0%, #050506 100%);
      color: var(--text);
      padding: 20px;
    }

    .shell {
      width: min(100%, 760px);
      margin: 0 auto;
      background: linear-gradient(180deg, rgba(22,22,28,0.96), rgba(12,12,16,0.96));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .brand {
      margin: 0;
      font-size: 2rem;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .brand span {
      color: var(--accent-2);
      text-shadow: 0 0 18px rgba(255,59,48,0.35);
    }

    .tag {
      margin: 10px 0 20px;
      color: var(--muted);
      font-size: 1rem;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .tab {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px 12px;
      background: linear-gradient(135deg, #1b1b22, #0f0f14);
      color: var(--text);
      font-weight: 700;
      min-height: 50px;
      text-align: center;
      cursor: pointer;
    }

    .tab.active {
      border-color: rgba(255,59,48,0.55);
      background: linear-gradient(135deg, #7f0f18, #1b0a0d);
    }

    .panel {
      display: none;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .panel.active { display: block; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .grid-1 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    label {
      display: block;
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      background: #0e0e13;
      color: var(--text);
      border-radius: 14px;
      padding: 14px 14px;
      font-size: 1rem;
      outline: none;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      border-color: rgba(255,59,48,0.7);
      box-shadow: 0 0 0 3px rgba(255,59,48,0.15);
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0)),
        linear-gradient(135deg, #1b1b22, #0f0f14);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 10px 24px rgba(0,0,0,0.35);
      min-height: 52px;
      width: 100%;
      cursor: pointer;
      text-align: left;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .btn:hover {
      border-color: rgba(255,59,48,0.45);
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .btn.primary {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0)),
        linear-gradient(135deg, #7f0f18, #1b0a0d);
      border-color: rgba(255,59,48,0.35);
    }

    .btn.success {
      border-color: rgba(61,220,151,0.35);
    }

    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      color: var(--muted);
      font-size: 0.92rem;
      min-height: 52px;
      white-space: pre-wrap;
    }

    .status.success { border-color: var(--success); }
    .status.error { border-color: var(--danger); }

    .footer {
      margin-top: 16px;
      font-size: 0.85rem;
      color: #8f8f99;
      text-align: center;
    }

    .small {
      font-size: 0.84rem;
      color: #9b9baa;
      margin-top: 8px;
      line-height: 1.4;
    }

    @media (max-width: 640px) {
      .tabs, .grid {
        grid-template-columns: 1fr;
      }

      .shell {
        padding: 18px;
      }

      .brand {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1 class="brand">SKSK <span>ProTech</span></h1>
    <p class="tag">Mobile Mechanic AI</p>

    <div class="tabs">
      <button class="tab active" data-tab="estimateTab">Estimate</button>
      <button class="tab" data-tab="diagnoseTab">Diagnose</button>
      <button class="tab" data-tab="invoiceTab">Invoice</button>
      <button class="tab" data-tab="shareTab">Share</button>
    </div>

    <section class="panel active" id="estimateTab">
      <div class="grid">
        <div>
          <label for="customerName">Customer name</label>
          <input id="customerName" type="text" placeholder="John Doe">
        </div>
        <div>
          <label for="customerPhone">Phone</label>
          <input id="customerPhone" type="text" placeholder="555-0123">
        </div>
        <div>
          <label for="customerEmail">Email</label>
          <input id="customerEmail" type="email" placeholder="john@example.com">
        </div>
        <div>
          <label for="laborRate">Labor rate</label>
          <input id="laborRate" type="number" value="65" min="0" step="1">
        </div>
        <div>
          <label for="partsCost">Parts cost</label>
          <input id="partsCost" type="number" value="80" min="0" step="1">
        </div>
        <div>
          <label for="vin">VIN</label>
          <input id="vin" type="text" placeholder="Optional">
        </div>
      </div>

      <div class="grid" style="margin-top:12px;">
        <div>
          <label for="vehicleYear">Year</label>
          <input id="vehicleYear" type="text" placeholder="2008">
        </div>
        <div>
          <label for="vehicleMake">Make</label>
          <input id="vehicleMake" type="text" placeholder="Ford">
        </div>
        <div>
          <label for="vehicleModel">Model</label>
          <input id="vehicleModel" type="text" placeholder="F150">
        </div>
        <div>
          <label for="vehicleTrim">Trim</label>
          <input id="vehicleTrim" type="text" placeholder="Optional">
        </div>
      </div>

      <div class="grid-1" style="margin-top:12px;">
        <div>
          <label for="customerStates">Customer states</label>
          <textarea id="customerStates" placeholder="Engine knocking, poor acceleration"></textarea>
        </div>
        <div>
          <label for="mechanicNotices">Mechanic notices</label>
          <textarea id="mechanicNotices" placeholder="Spark plugs fouled, rough idle"></textarea>
        </div>
        <div>
          <label for="obdCodes">OBD codes, comma separated</label>
          <input id="obdCodes" type="text" placeholder="P0300, P0171">
        </div>
      </div>

      <div class="actions">
        <button class="btn primary" id="btnEstimate">Generate Estimate</button>
      </div>

      <div class="small">
        Fill out the estimate fields above, then tap Generate Estimate.
      </div>
    </section>

    <section class="panel" id="diagnoseTab">
      <div class="grid">
        <div>
          <label for="diagVin">VIN</label>
          <input id="diagVin" type="text" placeholder="Optional">
        </div>
        <div>
          <label for="diagMileage">Mileage</label>
          <input id="diagMileage" type="number" placeholder="Optional">
        </div>
      </div>

      <div class="grid-1" style="margin-top:12px;">
        <div>
          <label for="diagSymptoms">Symptoms</label>
          <textarea id="diagSymptoms" placeholder="Noise when turning, hard start, check engine light"></textarea>
        </div>
        <div>
          <label for="diagCodes">Codes, comma separated</label>
          <input id="diagCodes" type="text" placeholder="P0300, P0171">
        </div>
        <div>
          <label for="diagNotes">Notes</label>
          <textarea id="diagNotes" placeholder="Battery tested weak, alternator charging at 13.2V"></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn primary" id="btnDiagnose">Submit Diagnosis</button>
      </div>
    </section>

    <section class="panel" id="invoiceTab">
      <div class="grid">
        <div>
          <label for="invoiceTotal">Invoice total</label>
          <input id="invoiceTotal" type="number" value="200" min="0" step="1">
        </div>
        <div>
          <label for="invoiceNumber">Invoice number</label>
          <input id="invoiceNumber" type="text" placeholder="Optional">
        </div>
      </div>

      <div class="grid-1" style="margin-top:12px;">
        <div>
          <label for="invoiceCustomer">Customer name</label>
          <input id="invoiceCustomer" type="text" placeholder="Test Customer">
        </div>
        <div>
          <label for="invoiceNotes">Notes</label>
          <textarea id="invoiceNotes" placeholder="Parts included, labor covered, tax added"></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn primary" id="btnInvoice">Generate Invoice PDF</button>
        <button class="btn" id="btnDecodeVin">Decode VIN</button>
      </div>
    </section>

    <section class="panel" id="shareTab">
      <div class="grid-1">
        <div>
          <label for="shareText">Share text</label>
          <textarea id="shareText">SKSK ProTech — Mobile Mechanic AI</textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn success" id="btnShare">Share</button>
      </div>
    </section>

    <div class="status" id="status">Ready.</div>
    <div class="footer">Professional. Sharp. Built to move fast.</div>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const API_BASE = window.location.hostname === 'localhost' 
  ? 'http://localhost:3000' 
  : 'https://p613-backend.onrender.com';

    const customerName = document.getElementById('customerName');
    const customerPhone = document.getElementById('customerPhone');
    const customerEmail = document.getElementById('customerEmail');
    const vehicleYear = document.getElementById('vehicleYear');
    const vehicleMake = document.getElementById('vehicleMake');
    const vehicleModel = document.getElementById('vehicleModel');

    function setStatus(msg, type = '') {
      statusEl.className = 'status ' + type;
      statusEl.textContent = msg;
    }

    function splitList(value) {
      return (value || '')
        .split(',')
        .map(s => s.trim())
        .filter(Boolean);
    }

    function splitLines(value) {
      return (value || '')
        .split(/\r?\n/)
        .map(s => s.trim())
        .filter(Boolean);
    }

    async function fetchWithTimeout(url, options = {}, timeout = 15000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } finally {
        clearTimeout(id);
      }
    }

    async function withLoading(button, action) {
      const original = button.textContent;
      button.disabled = true;
      button.textContent = 'Working...';
      try {
        await action();
      } finally {
        button.disabled = false;
        button.textContent = original;
      }
    }

    async function readBody(res) {
      const text = await res.text();
      try {
        return JSON.parse(text);
      } catch {
        return { error: text || `HTTP ${res.status}` };
      }
    }

    function saveForm() {
      localStorage.setItem('sksk_form', JSON.stringify({
        customerName: customerName.value,
        customerPhone: customerPhone.value,
        customerEmail: customerEmail.value,
        vehicleYear: vehicleYear.value,
        vehicleMake: vehicleMake.value,
        vehicleModel: vehicleModel.value,
        laborRate: document.getElementById('laborRate').value,
        partsCost: document.getElementById('partsCost').value,
        vin: document.getElementById('vin').value,
        customerStates: document.getElementById('customerStates').value,
        mechanicNotices: document.getElementById('mechanicNotices').value,
        obdCodes: document.getElementById('obdCodes').value
      }));
    }

    function restoreForm() {
      const saved = localStorage.getItem('sksk_form');
      if (!saved) return;
      try {
        const data = JSON.parse(saved);
        Object.keys(data).forEach(key => {
          const el = document.getElementById(key);
          if (el) el.value = data[key];
        });
      } catch {}
    }

    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });

    document.querySelectorAll('input, textarea').forEach(el => {
      el.addEventListener('input', saveForm);
    });

    document.getElementById('btnEstimate').addEventListener('click', () =>
      withLoading(document.getElementById('btnEstimate'), async () => {
        setStatus('Sending estimate...');
        try {
          const payload = {
            customer: {
              name: customerName.value.trim(),
              phone: customerPhone.value.trim(),
              email: customerEmail.value.trim()
            },
            vehicle: {
              year: vehicleYear.value.trim(),
              make: vehicleMake.value.trim(),
              model: vehicleModel.value.trim(),
              trim: document.getElementById('vehicleTrim').value.trim()
            },
            obdCodes: splitList(document.getElementById('obdCodes').value),
            customerStates: splitLines(document.getElementById('customerStates').value),
            mechanicNotices: splitLines(document.getElementById('mechanicNotices').value),
            laborRate: Number(document.getElementById('laborRate').value || 0),
            partsCost: Number(document.getElementById('partsCost').value || 0),
            vin: document.getElementById('vin').value.trim()
          };

          const res = await fetchWithTimeout(`${API_BASE}/api/estimate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const data = await readBody(res);
          if (!res.ok) throw new Error(data.error || `Estimate failed (${res.status})`);

          const est = data.estimate || {};
          const out = [
            '\u2705 ESTIMATE READY',
            'Diagnosis: ' + (est.diagnosis || 'N/A'),
            'Repairs: ' + ((est.repairs||[]).join(', ') || 'N/A'),
            'Est. Hours: ' + (est.estimatedHours || 'N/A'),
            'Labor: $' + (est.laborCost || 0) + '  |  Parts: $' + (est.partsCost || 0),
            'TOTAL: $' + (est.total || 0),
            'Priority: ' + (est.priority || 'N/A'),
            est.notes ? 'Notes: ' + est.notes : ''
          ].filter(Boolean).join('\n');
          setStatus(out, 'success');
        } catch (err) {
          setStatus(err.name === 'AbortError' ? 'Estimate timed out' : (err.message || 'Estimate failed.'), 'error');
        }
      })
    );

    document.getElementById('btnDiagnose').addEventListener('click', () =>
      withLoading(document.getElementById('btnDiagnose'), async () => {
        setStatus('Sending diagnosis...');
        try {
          const payload = {
            vin: document.getElementById('diagVin').value.trim(),
            mileage: Number(document.getElementById('diagMileage').value || 0),
            symptoms: splitLines(document.getElementById('diagSymptoms').value),
            codes: splitList(document.getElementById('diagCodes').value),
            notes: splitLines(document.getElementById('diagNotes').value)
          };

          const res = await fetchWithTimeout(`${API_BASE}/api/diagnose`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const data = await readBody(res);
          if (!res.ok) throw new Error(data.error || `Diagnosis failed (${res.status})`);

          const r = data.result || {};
          const diag = [
            '🔍 DIAGNOSIS COMPLETE',
            `Primary: ${r.primaryCause || 'N/A'}`,
            r.secondaryCauses?.length ? `Other causes: ${r.secondaryCauses.join(', ')}` : '',
            r.recommendedRepairs?.length ? `Repairs needed: ${r.recommendedRepairs.join(', ')}` : '',
            r.recommendedTests?.length ? `Run these tests: ${r.recommendedTests.join(', ')}` : '',
            `Urgency: ${r.urgency || 'N/A'}  |  Safety risk: ${r.safetyRisk ? 'YES ⚠️' : 'No'}`,
            `Est. repair time: ${r.estimatedRepairTime || 'N/A'}`,
            r.notes ? `Notes: ${r.notes}` : ''
          ].filter(Boolean).join('\n');
          setStatus(diag, 'success');
        } catch (err) {
          setStatus(err.name === 'AbortError' ? 'Diagnosis timed out' : (err.message || 'Diagnosis failed.'), 'error');
        }
      })
    );

    document.getElementById('btnInvoice').addEventListener('click', () =>
      withLoading(document.getElementById('btnInvoice'), async () => {
        setStatus('Generating invoice...');
        try {
          const payload = {
            total: Number(document.getElementById('invoiceTotal').value || 0),
            invoiceNumber: document.getElementById('invoiceNumber').value.trim(),
            customer: { name: document.getElementById('invoiceCustomer').value.trim() },
            notes: document.getElementById('invoiceNotes').value.trim()
          };

          const res = await fetchWithTimeout(`${API_BASE}/api/invoice`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!res.ok) {
            const data = await readBody(res);
            throw new Error(data.error || `Invoice failed (${res.status})`);
          }

          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `invoice-${Date.now()}.pdf`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setStatus('Invoice downloaded.', 'success');
        } catch (err) {
          setStatus(err.name === 'AbortError' ? 'Invoice timed out' : (err.message || 'Invoice failed.'), 'error');
        }
      })
    );

    document.getElementById('btnDecodeVin').addEventListener('click', () => {
      const vin = document.getElementById('vin').value.trim() || document.getElementById('diagVin').value.trim();
      if (!vin) {
        setStatus('Enter VIN first', 'error');
        return;
      }
      setStatus('VIN decoder not connected yet', '');
    });

    document.getElementById('btnShare').addEventListener('click', async () => {
      const text = document.getElementById('shareText').value.trim();

      if (navigator.share) {
        try {
          await navigator.share({
            title: 'SKSK ProTech',
            text,
            url: location.href
          });
          setStatus('Shared.', 'success');
        } catch {
          setStatus('Share canceled.', 'error');
        }
      } else {
        try {
          await navigator.clipboard.writeText(`${text} ${location.href}`);
          setStatus('Share text copied to clipboard.', 'success');
        } catch {
          setStatus('Sharing is not supported on this device.', 'error');
        }
      }
    });

    window.addEventListener('offline', () => {
      setStatus('Offline - waiting for connection', 'error');
    });

    window.addEventListener('online', () => {
      setStatus('Back online', 'success');
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => {
            reg.addEventListener('updatefound', () => {
              setStatus('App update available', 'success');
            });
          })
          .catch(() => {
            setStatus('Service worker failed', 'error');
          });
      });
    }

    restoreForm();
  </script>
</body>
  </html>
