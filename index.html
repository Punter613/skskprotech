<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="AI-powered mobile mechanic diagnostic estimates with real-time pricing" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23050505' width='192' height='192'/><text x='50%' y='50%' font-size='80' font-weight='bold' fill='%23ff2a2a' text-anchor='middle' dominant-baseline='middle'>⚙️</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23050505' width='180' height='180' rx='40'/><text x='90' y='90' font-size='100' font-weight='bold' fill='%23ff2a2a' text-anchor='middle' dominant-baseline='middle'>⚙️</text></svg>">
  <title>SKSK ProTech — Mobile Mechanic Estimate</title>
  <style>
    :root {
      --bg: #050505;
      --panel: #101010;
      --panel-2: #151515;
      --text: #ff2a2a;
      --muted: #b85a5a;
      --border: #2d2d2d;
      --accent-blue: #4aa3ff;
      --accent-green: #46d17d;
      --accent-gold: #f0b84b;
      --accent-purple: #b48cff;
      --danger: #ff5c5c;
      --shadow: 0 8px 24px rgba(0,0,0,0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top, #111 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      touch-action: manipulation;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 1rem;
      padding-bottom: 2rem;
    }

    .card {
      background: linear-gradient(180deg, #111, #090909);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0.25rem 0 0.25rem;
      font-size: 1.8rem;
      color: var(--text);
      letter-spacing: 0.5px;
    }

    .subtitle {
      margin: 0 0 1rem;
      color: var(--muted);
    }

    h2 {
      margin: 1.25rem 0 0.5rem;
      font-size: 1.05rem;
      padding-left: 10px;
      border-left: 4px solid var(--accent-blue);
      color: var(--text);
    }

    h3 {
      margin: 1rem 0 0.5rem;
      font-size: 1rem;
      color: var(--accent-green);
    }

    .section-gold { border-left-color: var(--accent-gold); }
    .section-purple { border-left-color: var(--accent-purple); }
    .section-green { border-left-color: var(--accent-green); }
    .section-red { border-left-color: var(--danger); }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #333;
      font-size: 1rem;
      background: #0f0f0f;
      color: #ff5a5a;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      font-family: inherit;
    }

    input::placeholder, textarea::placeholder {
      color: #8f4d4d;
    }

    input:focus, textarea:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 2px rgba(74,163,255,0.15);
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 0.25rem;
      background: linear-gradient(180deg, #ff3a3a, #c80000);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(255, 0, 0, 0.22);
      -webkit-appearance: none;
      appearance: none;
      min-height: 48px;
      transition: filter 0.2s ease, opacity 0.2s ease;
      font-family: inherit;
    }

    button:hover:not(:disabled) { 
      filter: brightness(1.05);
    }

    button:active:not(:disabled) {
      filter: brightness(0.95);
    }

    button:disabled {
      background: #666;
      cursor: not-allowed;
      box-shadow: none;
      opacity: 0.7;
    }

    #status {
      margin-top: 1rem;
      font-size: 0.95rem;
      color: var(--accent-gold);
      min-height: 1.2em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-spinner {
      display: inline-block;
      width: 1em;
      height: 1em;
      border: 2px solid rgba(240, 184, 75, 0.3);
      border-top-color: var(--accent-gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-error {
      color: var(--danger);
    }

    .status-success {
      color: var(--accent-green);
    }

    .estimate-box {
      background: linear-gradient(180deg, var(--panel), #0a0a0a);
      border: 1px solid var(--border);
      padding: 1rem;
      margin-top: 1.5rem;
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    .estimate-box p {
      margin: 0.35rem 0;
      color: #ff5b5b;
      line-height: 1.45;
    }

    .estimate-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 12px;
      margin-top: 1rem;
      padding: 0.85rem;
      background: var(--panel-2);
      border: 1px solid #242424;
      border-radius: 12px;
    }

    .estimate-grid > div:nth-child(odd) { color: var(--accent-blue); }
    .estimate-grid > div:nth-child(even) {
      color: #fff0f0;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .estimate-total {
      margin-top: 1rem;
      font-size: 1.3rem;
      font-weight: bold;
      text-align: right;
      color: var(--accent-green);
      padding: 0.5rem 0;
      border-top: 1px solid #2a2a2a;
    }

    small {
      display: block;
      color: #9b6f6f;
      margin-top: 0.35rem;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .label-blue { color: var(--accent-blue); }
    .label-gold { color: var(--accent-gold); }
    .label-green { color: var(--accent-green); }
    .label-red { color: var(--danger); }
    .label-purple { color: var(--accent-purple); }

    .divider {
      margin: 1rem 0;
      border: 0;
      border-top: 1px solid #292929;
    }

    .install-prompt {
      display: none;
      background: linear-gradient(180deg, #1a1a1a, #0d0d0d);
      border: 2px solid var(--accent-gold);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      text-align: center;
    }

    .install-prompt.show {
      display: block;
    }

    .install-prompt button {
      margin-top: 0.5rem;
      background: linear-gradient(180deg, var(--accent-gold), #d4941f);
      padding: 12px;
      font-size: 0.95rem;
    }

    ul {
      margin: 0.35rem 0 0.75rem 1.2rem;
      padding: 0;
    }

    li {
      margin-bottom: 0.35rem;
      color: #ff5b5b;
    }

    @media (max-width: 480px) {
      .container {
        padding: 0.75rem;
      }
      h1 {
        font-size: 1.5rem;
      }
      button {
        padding: 14px;
        min-height: 44px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="installPrompt" class="install-prompt">
      <p style="margin: 0 0 0.5rem; color: var(--accent-gold); font-weight: bold;">Install SKSK ProTech</p>
      <small style="color: var(--muted);">Get instant access on your home screen</small>
      <button id="installBtn" style="margin: 0.75rem 0 0;">Install App</button>
      <button id="dismissInstall" style="background: #444; margin: 0.25rem 0 0;">Dismiss</button>
    </div>

    <div class="card">
      <h1>SKSK ProTech</h1>
      <p class="subtitle">Mobile Mechanic AI Estimate Generator</p>

      <h2 class="section-blue">Customer Info</h2>
      <input id="customerName" placeholder="Customer name" autocomplete="name" />
      <input id="customerPhone" placeholder="Phone number" autocomplete="tel" inputmode="tel" />

      <h2 class="section-gold">Vehicle Info</h2>
      <input id="vehicleYear" placeholder="Year (e.g. 2008)" autocomplete="off" inputmode="numeric" />
      <input id="vehicleMake" placeholder="Make (e.g. Kia)" autocomplete="off" />
      <input id="vehicleModel" placeholder="Model (e.g. Sorento)" autocomplete="off" />

      <h2 class="section-green">Symptoms</h2>
      <textarea id="symptoms" rows="4" placeholder="Describe the issue..."></textarea>

      <h2 class="section-purple">OBD Codes</h2>
      <input id="codes" placeholder="Comma-separated codes (P0300, P0171)" />

      <h2 class="section-red">Mechanic Findings</h2>
      <textarea id="mechanicFindings" rows="4" placeholder="Technician notes (optional)"></textarea>

      <button id="generateBtn">Generate Estimate</button>

      <div id="status"></div>
      <div id="estimateContainer" class="estimate-box"></div>
    </div>
  </div>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => {
          console.log('[App] Service Worker registered:', reg.scope);
        })
        .catch(err => {
          console.warn('[App] Service Worker registration failed:', err);
        });
    }

    // Install PWA prompt
    let deferredPrompt;
    const installPrompt = document.getElementById('installPrompt');
    const installBtn = document.getElementById('installBtn');
    const dismissInstall = document.getElementById('dismissInstall');

    window.addEventListener('beforeinstallprompt', event => {
      event.preventDefault();
      deferredPrompt = event;
      installPrompt.classList.add('show');
    });

    installBtn?.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const outcome = await deferredPrompt.userChoice;
        console.log('[App] Install outcome:', outcome.outcome);
        deferredPrompt = null;
        installPrompt.classList.remove('show');
      }
    });

    dismissInstall?.addEventListener('click', () => {
      installPrompt.classList.remove('show');
      deferredPrompt = null;
    });

    window.addEventListener('appinstalled', () => {
      console.log('[App] PWA installed successfully');
      installPrompt.classList.remove('show');
    });

    // API Configuration
    const API_BASE = 'https://p613-backend.onrender.com';
    const TIMEOUT_MS = 20000;

    const generateBtn = document.getElementById('generateBtn');
    const statusEl = document.getElementById('status');
    const estimateContainer = document.getElementById('estimateContainer');

    function setStatus(msg, type = 'info') {
      statusEl.innerHTML = '';
      if (msg) {
        if (type === 'loading') {
          const spinner = document.createElement('div');
          spinner.className = 'status-spinner';
          statusEl.appendChild(spinner);
        }
        const text = document.createElement('span');
        text.className = `status-${type}`;
        text.textContent = msg;
        statusEl.appendChild(text);
      }
    }

    function splitLines(value) {
      return String(value || '')
        .split(/\r?\n/)
        .map(s => s.trim())
        .filter(Boolean);
    }

    function clearNode(node) {
      while (node.firstChild) node.removeChild(node.firstChild);
    }

    function el(tag, text, className) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined && text !== null) node.textContent = String(text);
      return node;
    }

    function addLine(parent, label, value, labelClass) {
      const p = document.createElement('p');
      const strong = document.createElement('strong');
      strong.className = labelClass || '';
      strong.textContent = label + ' ';
      p.appendChild(strong);
      p.appendChild(document.createTextNode(value || ''));
      parent.appendChild(p);
    }

    function renderListSection(parent, title, items, emptyText, titleClass) {
      parent.appendChild(el('h3', title, titleClass));
      if (items && items.length) {
        const ul = document.createElement('ul');
        items.forEach(item => {
          const li = document.createElement('li');
          li.textContent = item;
          ul.appendChild(li);
        });
        parent.appendChild(ul);
      } else {
        parent.appendChild(el('p', emptyText));
      }
    }

    function renderEstimate(data) {
      clearNode(estimateContainer);

      if (!data || !data.estimate) {
        estimateContainer.appendChild(el('p', 'Unable to build estimate.'));
        return;
      }

      const e = data.estimate;
      const c = e.customer || {};
      const v = e.vehicle || {};

      estimateContainer.appendChild(el('h3', 'Customer Summary', 'label-red'));
      estimateContainer.appendChild(el('p', e.customerSummary || ''));
      estimateContainer.appendChild(el('small', e.disclaimer || ''));

      const hr = document.createElement('hr');
      hr.className = 'divider';
      estimateContainer.appendChild(hr);

      estimateContainer.appendChild(el('h3', 'Vehicle & Concern', 'label-gold'));
      addLine(estimateContainer, 'Customer:', `${c.name || ''} · ${c.phone || ''}`, 'label-blue');
      addLine(estimateContainer, 'Vehicle:', `${v.year || ''} ${v.make || ''} ${v.model || ''}`.trim(), 'label-blue');
      addLine(estimateContainer, 'Primary Concern:', e.primaryConcern || '', 'label-purple');

      estimateContainer.appendChild(el('h3', 'Estimate Breakdown', 'label-green'));

      const grid = el('div', null, 'estimate-grid');
      const items = [
        ['Labor hours:', Number(e.laborHours || 0).toFixed(2)],
        ['Labor total:', `$${Number(e.laborTotal || 0).toFixed(2)}`],
        ['Parts total:', `$${Number(e.partsTotal || 0).toFixed(2)}`],
        ['Shop supplies:', `$${Number(e.shopSupplies || 0).toFixed(2)}`],
        ['Tax set-aside:', `$${Number(e.tax || 0).toFixed(2)}`]
      ];

      items.forEach(([label, value]) => {
        grid.appendChild(el('div', label));
        grid.appendChild(el('div', value));
      });

      estimateContainer.appendChild(grid);
      estimateContainer.appendChild(el('div', `Estimate total: $${Number(e.grandTotal || 0).toFixed(2)}`, 'estimate-total'));

      estimateContainer.appendChild(el('h3', 'Tech Notes', 'label-red'));
      const notes = document.createElement('p');
      notes.style.whiteSpace = 'pre-wrap';
      notes.textContent = e.diagnosticNotes || '';
      estimateContainer.appendChild(notes);
      estimateContainer.appendChild(el('small', e.engineMeta || ''));

      renderListSection(
        estimateContainer,
        'Known Issues for This Vehicle',
        e.knownIssues || [],
        'No known issues found.',
        'label-gold'
      );

      renderListSection(
        estimateContainer,
        'Pro Tips',
        e.proTips || [],
        'No pro tips available.',
        'label-green'
      );

      renderListSection(
        estimateContainer,
        'Related Failures to Watch For',
        e.relatedFailures || [],
        'No related failures listed.',
        'label-purple'
      );
    }

    async function fetchWithTimeout(url, options = {}) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), TIMEOUT_MS);

      try {
        const res = await fetch(url, { ...options, signal: controller.signal });
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        return res;
      } catch (err) {
        if (err.name === 'AbortError') {
          throw new Error('Request timeout - check your connection');
        }
        throw err;
      } finally {
        clearTimeout(timeout);
      }
    }

    generateBtn.addEventListener('click', async () => {
      const payload = {
        customer: {
          name: document.getElementById('customerName').value.trim(),
          phone: document.getElementById('customerPhone').value.trim()
        },
        vehicle: {
          year: document.getElementById('vehicleYear').value.trim(),
          make: document.getElementById('vehicleMake').value.trim(),
          model: document.getElementById('vehicleModel').value.trim()
        },
        obdCodes: document.getElementById('codes').value
          .split(',')
          .map(c => c.trim())
          .filter(Boolean),
        customerStates: splitLines(document.getElementById('symptoms').value),
        mechanicNotices: splitLines(document.getElementById('mechanicFindings').value),
        laborRate: 65
      };

      if (!payload.customer.name || !payload.customer.phone) {
        setStatus('Please fill in customer name and phone', 'error');
        return;
      }

      if (!payload.vehicle.year || !payload.vehicle.make || !payload.vehicle.model) {
        setStatus('Please fill in all vehicle info', 'error');
        return;
      }

      if (payload.customerStates.length === 0) {
        setStatus('Please describe the vehicle issue', 'error');
        return;
      }

      setStatus('AI building estimate…', 'loading');
      generateBtn.disabled = true;

      try {
        const res = await fetchWithTimeout(`${API_BASE}/api/estimate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ incomingPayload: payload })
        });

        const data = await res.json();
        renderEstimate(data);
        setStatus('Estimate ready.', 'success');
      } catch (err) {
        console.error('Estimate Error:', err);
        const errorMsg = err.message || 'Error generating estimate. Please try again.';
        setStatus(errorMsg, 'error');
        clearNode(estimateContainer);
        estimateContainer.appendChild(el('p', errorMsg));
      } finally {
        generateBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
