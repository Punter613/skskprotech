<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b0b0f" />
  <link rel="manifest" href="/manifest.json">
  <title>SKSK ProTech</title>
  <style>
    :root {
      --bg: #07070a;
      --panel: #101015;
      --panel-2: #17171f;
      --accent: #c1121f;
      --accent-2: #ff3b30;
      --text: #f5f5f7;
      --muted: #b7b7c2;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(193,18,31,0.22), transparent 35%),
        linear-gradient(180deg, #09090d 0%, #050506 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(100%, 480px);
      background: linear-gradient(180deg, rgba(22,22,28,0.96), rgba(12,12,16,0.96));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px 20px 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .brand {
      margin: 0;
      font-size: 2.1rem;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .brand span {
      color: var(--accent-2);
      text-shadow: 0 0 18px rgba(255,59,48,0.35);
    }

    .tag {
      margin: 10px 0 22px;
      color: var(--muted);
      font-size: 1rem;
    }

    .grid {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }

    button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0)),
        linear-gradient(135deg, #1b1b22, #0f0f14);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 10px 24px rgba(0,0,0,0.35);
      min-height: 52px;
      width: 100%;
      text-align: left;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    button:hover {
      border-color: rgba(255,59,48,0.45);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0)),
        linear-gradient(135deg, #221014, #120b0f);
    }

    .primary {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0)),
        linear-gradient(135deg, #7f0f18, #1b0a0d);
      border-color: rgba(255,59,48,0.35);
    }

    .primary:hover {
      border-color: rgba(255,59,48,0.8);
    }

    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      color: var(--muted);
      font-size: 0.92rem;
      min-height: 44px;
    }

    .footer {
      margin-top: 18px;
      font-size: 0.85rem;
      color: #8f8f99;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1 class="brand">SKSK <span>ProTech</span></h1>
    <p class="tag">Mobile Mechanic AI</p>

    <div class="grid">
      <button class="primary" id="btnEstimate">Estimate</button>
      <button id="btnDiagnose">Diagnose</button>
      <button id="btnInvoice">Invoice PDF</button>
      <button id="btnShare">Share</button>
    </div>

    <div class="status" id="status">Ready.</div>
    <div class="footer">Professional. Sharp. Built to move fast.</div>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const setStatus = msg => { statusEl.textContent = msg; };

    async function readJson(res) {
      const text = await res.text();
      try { return JSON.parse(text); } catch { return { error: text || `HTTP ${res.status}` }; }
    }

    document.getElementById('btnEstimate').addEventListener('click', async () => {
      setStatus('Sending estimate...');
      try {
        const res = await fetch('/api/estimate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ labor: 120, parts: 80, vin: '' })
        });
        const data = await readJson(res);
        if (!res.ok) throw new Error(data.error || 'Estimate failed');
        setStatus(`Estimate ready: $${data.estimate.total}`);
      } catch (err) {
        setStatus(err.message || 'Estimate failed');
      }
    });

    document.getElementById('btnDiagnose').addEventListener('click', async () => {
      setStatus('Sending diagnosis...');
      try {
        const res = await fetch('/api/diagnose', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ vin: '', symptoms: ['noise'], codes: [] })
        });
        const data = await readJson(res);
        if (!res.ok) throw new Error(data.error || 'Diagnosis failed');
        setStatus('Diagnosis submitted.');
      } catch (err) {
        setStatus(err.message || 'Diagnosis failed');
      }
    });

    document.getElementById('btnInvoice').addEventListener('click', async () => {
      setStatus('Generating invoice...');
      try {
        const res = await fetch('/api/invoice', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ total: 200, customer: { name: 'Test' } })
        });
        if (!res.ok) {
          const data = await readJson(res);
          throw new Error(data.error || 'Invoice failed');
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        window.open(url, '_blank');
        setStatus('Invoice opened.');
      } catch (err) {
        setStatus(err.message || 'Invoice failed');
      }
    });

    document.getElementById('btnShare').addEventListener('click', async () => {
      if (navigator.share) {
        try {
          await navigator.share({
            title: 'SKSK ProTech',
            text: 'Mobile Mechanic AI',
            url: location.href
          });
          setStatus('Shared.');
        } catch {
          setStatus('Share canceled.');
        }
      } else {
        setStatus('Sharing is not supported on this device.');
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => setStatus('Service worker failed.'));
      });
    }
  </script>
</body>
</html>
