<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SKSK ProTech — Mobile Mechanic Estimate</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .container {
      max-width: 480px;
      margin: auto;
      padding: 1rem;
    }

    h2 {
      margin-top: 1.5rem;
      font-size: 1.3rem;
      border-left: 4px solid #007bff;
      padding-left: 8px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1.1rem;
      cursor: pointer;
    }

    button:disabled {
      background: #999;
    }

    #status {
      margin-top: 1rem;
      font-size: 0.95rem;
      color: #444;
    }

    .estimate-box {
      background: white;
      padding: 1rem;
      margin-top: 1.5rem;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .estimate-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px 12px;
      margin-top: 1rem;
    }

    .estimate-total {
      margin-top: 1rem;
      font-size: 1.3rem;
      font-weight: bold;
      text-align: right;
    }

    small {
      color: #666;
    }
  </style>
</head><body>
  <div class="container">

    <h1>SKSK ProTech</h1>
    <p>Mobile Mechanic AI Estimate Generator</p>

    <!-- CUSTOMER -->
    <h2>Customer Info</h2>
    <input id="customerName" placeholder="Customer name" />
    <input id="customerPhone" placeholder="Phone number" />

    <!-- VEHICLE -->
    <h2>Vehicle Info</h2>
    <input id="vehicleYear" placeholder="Year (e.g. 2008)" />
    <input id="vehicleMake" placeholder="Make (e.g. Kia)" />
    <input id="vehicleModel" placeholder="Model (e.g. Sorento)" />

    <!-- SYMPTOMS -->
    <h2>Symptoms</h2>
    <textarea id="symptoms" rows="3" placeholder="Describe the issue..."></textarea>

    <!-- OBD CODES -->
    <h2>OBD Codes</h2>
    <input id="codes" placeholder="Comma-separated codes (P0300, P0171)" />

    <!-- MECHANIC FINDINGS -->
    <h2>Mechanic Findings</h2>
    <textarea id="mechanicFindings" rows="3" placeholder="Technician notes (optional)"></textarea>

    <button id="generateBtn">Generate Estimate</button>

    <div id="status"></div>

    <div id="estimateContainer" class="estimate-box"></div>

  </div><script>
  const generateBtn = document.getElementById('generateBtn');
  const statusEl = document.getElementById('status');
  const estimateContainer = document.getElementById('estimateContainer');

  function setStatus(msg) {
    statusEl.textContent = msg || '';
  }

  function renderEstimate(data) {
    if (!data || !data.estimate) {
      estimateContainer.innerHTML = '<p>Unable to build estimate.</p>';
      return;
    }

    const e = data.estimate;
    const c = e.customer || {};
    const v = e.vehicle || {};
    const copy = e.copy || {};
    const tech = e.tech || {};

    estimateContainer.innerHTML = `
      <h3>Customer Summary</h3>
      <p>${copy.customerSummary}</p>
      <small>${copy.disclaimer}</small>

      <h3 style="margin-top:1rem;">Vehicle & Concern</h3>
      <p><strong>Customer:</strong> ${c.name || ''} · ${c.phone || ''}</p>
      <p><strong>Vehicle:</strong> ${v.year} ${v.make} ${v.model}</p>
      <p><strong>Primary Concern:</strong> ${copy.primaryConcern}</p>

      <h3 style="margin-top:1rem;">Estimate Breakdown</h3>
      <div class="estimate-grid">
        <div>Labor hours:</div><div>${e.laborHours.toFixed(2)}</div>
        <div>Labor total:</div><div>$${e.laborTotal.toFixed(2)}</div>
        <div>Parts total:</div><div>$${e.partsTotal.toFixed(2)}</div>
        <div>Shop supplies:</div><div>$${e.shopSupplies.toFixed(2)}</div>
        <div>Tax set‑aside:</div><div>$${e.tax.toFixed(2)}</div>
      </div>

      <div class="estimate-total">
        Estimate total: $${e.grandTotal.toFixed(2)}
      </div>

      <h3 style="margin-top:1rem;">Tech Notes</h3>
      <p style="white-space:pre-wrap;">${tech.diagnosticNotes}</p>
      <small>${tech.engineMeta}</small>
    `;
  }

  generateBtn.addEventListener('click', async () => {
    const payload = {
      customer: {
        name: document.getElementById('customerName').value.trim(),
        phone: document.getElementById('customerPhone').value.trim(),
      },
      vehicle: {
        year: document.getElementById('vehicleYear').value.trim(),
        make: document.getElementById('vehicleMake').value.trim(),
        model: document.getElementById('vehicleModel').value.trim(),
      },
      obdCodes: document.getElementById('codes').value.split(',').map(c => c.trim()).filter(Boolean),
      customerStates: document.getElementById('symptoms').value.trim().split('\n').filter(Boolean),
      mechanicNotices: document.getElementById('mechanicFindings').value.trim().split('\n').filter(Boolean),
      laborRate: 65
    };

    setStatus('AI building estimate…');
    generateBtn.disabled = true;

    try {
      const res = await fetch('/api/estimate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ incomingPayload: payload }),
      });

      if (!res.ok) throw new Error('Server error: ' + res.status);

      const data = await res.json();
      renderEstimate(data);
      setStatus('Estimate ready.');
    } catch (err) {
      console.error(err);
      setStatus('Error generating estimate.');
      estimateContainer.innerHTML = '<p>Something went wrong.</p>';
    } finally {
      generateBtn.disabled = false;
    }
  });
</script>
</body>
</html>
