name: Build and Release Scraper

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Build scraper
        run: |
          cd tools/lemon_scraper
          cargo build --release

          mkdir -p ../../artifacts
          cp target/release/lemon_scraper ../../artifacts/

      - name: Upload Release Artifact
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/lemon_scraper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
