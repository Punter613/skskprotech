name: Build and Push Docker

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/sksk:${{ github.sha }} \
            .

      - name: Push Image
        run: |
          docker push \
            ghcr.io/${{ github.repository_owner }}/sksk:${{ github.sha }}
