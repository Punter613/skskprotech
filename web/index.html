<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SKSK ProTech - Mobile PWA</title>
  <meta name="description" content="SKSK ProTech - Mobile Estimator">
  <link rel="manifest" href="/manifest.json">
  <style>body{font-family:system-ui,Arial;background:#0b0b0f;color:#fff;padding:12px}</style>
</head>
<body>
  <h1>SKSK ProTech - Mobile PWA</h1>
  <p>Quick test client for the Intelligence API.</p>
  <div>
    <label>VIN<br><input id="vin" value="1FTFW1ET5DFC10312"></label>
  </div>
  <div>
    <label>Make<br><input id="make" value="Ford"></label>
  </div>
  <div>
    <label>Model<br><input id="model" value="F-150"></label>
  </div>
  <div>
    <label>Year<br><input id="year" value="2019"></label>
  </div>
  <div>
    <label>Mileage<br><input id="mileage" value="85000"></label>
  </div>
  <div>
    <label>Input (symptom)<br><input id="input" value="grinding noise when braking"></label>
  </div>
  <button id="btn">Run Analyze</button>
  <pre id="out"></pre>

  <script>
    document.getElementById('btn').addEventListener('click', async () => {
      const payload = {
        input: document.getElementById('input').value,
        vehicleProfile: {
          vin: document.getElementById('vin').value,
          make: document.getElementById('make').value,
          model: document.getElementById('model').value,
          year: parseInt(document.getElementById('year').value,10),
          mileage: parseInt(document.getElementById('mileage').value,10)
        }
      };

      const out = document.getElementById('out');
      out.textContent = 'Running...';

      try {
        const res = await fetch('/api/intelligence/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        out.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        out.textContent = err.message;
      }
    });
  </script>
</body>
</html>
