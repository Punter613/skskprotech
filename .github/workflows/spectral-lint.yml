name: Spectral Lint

on:
  push:
    paths:
      - 'openapi.yaml'
      - '.spectral.yaml'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'openapi.yaml'
      - '.spectral.yaml'
      - '.github/workflows/**'

jobs:
  spectral-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Spectral CLI
        run: npm install -g @stoplight/spectral@8.0.0

      - name: Lint OpenAPI with Spectral
        run: |
          OPENAPI_PATH="openapi.yaml"
          if [ ! -f "$OPENAPI_PATH" ]; then
            echo "OpenAPI file not found at $OPENAPI_PATH"
            exit 1
          fi
          if [ -f .spectral.yaml ]; then
            spectral lint "$OPENAPI_PATH" --ruleset .spectral.yaml --format pretty
          else
            spectral lint "$OPENAPI_PATH" --ruleset spectral:oas --format pretty
          fi
