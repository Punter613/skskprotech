name: Build lemon_scraper

on:
  push:
    paths:
      - 'tools/lemon_scraper/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      - name: Install Cross-RS Engine
        run: |
          curl -L https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv cross /usr/local/bin/

      # 🛠️ SWAPPED: Forging a static binary for x86_64 servers instead of ARM64 phones
      - name: Build release for x86_64 MUSL via Cross
        run: |
          cross build --release \
            --manifest-path=tools/lemon_scraper/Cargo.toml \
            --target x86_64-unknown-linux-musl \
            --features reqwest/native-tls-vendored,reqwest/trust-dns
            
      - name: Upload Server Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lemon_scraper-server-x86_64
          path: tools/lemon_scraper/target/x86_64-unknown-linux-musl/release/lemon_scraper
