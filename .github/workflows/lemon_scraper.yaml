name: Build Scraper Binary

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      - name: Build release binary
        run: cargo build --release --manifest-path=tools/lemon_scraper/Cargo.toml

      - name: Commit binary back to repository
        run: |
          mkdir -p bin
          cp tools/lemon_scraper/target/release/lemon_scraper bin/lemon_scraper
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/lemon_scraper
          git commit -m "build: auto-forge production x86_64 binary [skip ci]" || echo "No changes to binary"
          git push
