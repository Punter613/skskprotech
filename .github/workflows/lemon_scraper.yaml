name: Build lemon_scraper

on:
  push:
    paths:
      - 'tools/lemon_scraper/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      - name: Add target
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Install ARM64 Cross-Linker
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release for aarch64
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --manifest-path=tools/lemon_scraper/Cargo.toml --target aarch64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lemon_scraper-aarch64
          path: target/aarch64-unknown-linux-gnu/release/lemon_scraper
