name: Build lemon_scraper

on:
  push:
    paths:
      - 'tools/lemon_scraper/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      # 📥 Snatch the pre-compiled Cross binary from GitHub releases in 2 seconds
      - name: Install Cross-RS Engine
        run: |
          curl -L https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv cross /usr/local/bin/

      # ⚡ Let Cross spin up the dedicated container to cast the static MUSL block perfectly
      - name: Build release for aarch64 MUSL via Cross
        run: |
          cross build --release \
            --manifest-path=tools/lemon_scraper/Cargo.toml \
            --target aarch64-unknown-linux-musl \
            --features reqwest/native-tls-vendored
            
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lemon_scraper-aarch64
          path: tools/lemon_scraper/target/aarch64-unknown-linux-musl/release/lemon_scraper
